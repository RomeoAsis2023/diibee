<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Powered JSON Database - Real-time CRUD with Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/@octokit/rest@20.0.2/dist/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 24px;
        }

        .header h1 small {
            font-size: 12px;
            opacity: 0.8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 25px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .sync-dot.syncing {
            background: #fbbf24;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toolbar {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-github {
            background: #24292e;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        th {
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #e9ecef;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close {
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .repeatable-fields {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
        }

        .repeatable-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            position: relative;
        }

        .repeatable-item .remove-item {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-add {
            margin-top: 10px;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        .status {
            padding: 10px 20px;
            margin: 10px 30px;
            border-radius: 6px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .pagination {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .page-size-select {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .loading-spinner {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-container {
            text-align: center;
            padding: 60px 20px;
        }

        .login-btn {
            padding: 15px 40px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filters {
                flex-direction: column;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Syncing with GitHub...</p>
        </div>
    </div>

    <div class="container" id="appContainer" style="display: none;">
        <div class="header">
            <div>
                <h1>📊 GitHub JSON Database <small>Real-time CRUD</small></h1>
                <p style="font-size: 12px; margin-top: 5px;">Multi-user sync with GitHub Storage</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="sync-status">
                    <div class="sync-dot" id="syncDot"></div>
                    <span id="syncText">Connected</span>
                </div>
                <div class="user-info" id="userInfo"></div>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="toolbar">
            <div class="filters">
                <input type="text" id="filterCollection" placeholder="Filter Collection..." style="width: 150px;">
                <input type="text" id="filterMetaKey" placeholder="Filter Meta Key..." style="width: 150px;">
                <input type="text" id="filterMetaValue" placeholder="Filter Meta Value..." style="width: 150px;">
                <select id="relationalFilter">
                    <option value="">All Relations</option>
                </select>
                <button class="btn btn-primary" onclick="applyFilters()">🔍 Apply Filters</button>
                <button class="btn btn-warning" onclick="clearFilters()">🔄 Clear</button>
                <button class="btn btn-success" onclick="forceSync()">🔄 Force Sync</button>
            </div>
            <div>
                <button class="btn btn-primary" onclick="openCreateModal()">➕ Create New Record</button>
                <button class="btn btn-success" onclick="exportToJSON()">📥 Export JSON</button>
                <button class="btn btn-warning" onclick="importFromJSON()">📤 Import JSON</button>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="pagination">
            <div>
                Showing <span id="startRange">0</span> - <span id="endRange">0</span> of <span id="totalRecords">0</span>
            </div>
            <div class="pagination-controls">
                <select id="pageSizeSelect" class="page-size-select" onchange="changePageSize()">
                    <option value="10">10 per page</option>
                    <option value="15" selected>15 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                    <option value="100">100 per page</option>
                </select>
                <button class="btn" onclick="firstPage()" id="firstBtn">⏮ First</button>
                <button class="btn" onclick="previousPage()" id="prevBtn">◀ Previous</button>
                <span id="pageInfo">Page 1</span>
                <button class="btn" onclick="nextPage()" id="nextBtn">Next ▶</button>
                <button class="btn" onclick="lastPage()" id="lastBtn">Last ⏭</button>
            </div>
        </div>
    </div>

    <div class="container" id="loginContainer">
        <div class="login-container">
            <h1 style="margin-bottom: 20px;">📊 GitHub JSON Database</h1>
            <p style="margin-bottom: 30px; color: #666;">Real-time CRUD with GitHub Authentication</p>
            <button class="btn btn-github login-btn" onclick="loginWithGitHub()">
                🔐 Login with GitHub
            </button>
            <p style="margin-top: 20px; font-size: 12px; color: #999;">
                Securely stores your data in your GitHub repository
            </p>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Record</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="recordForm">
                <input type="hidden" id="recordId">
                
                <div class="form-group">
                    <label>Collection Type *</label>
                    <select id="collection" required>
                        <option value="user">User</option>
                        <option value="post">Post</option>
                        <option value="page">Page</option>
                        <option value="category">Category</option>
                        <option value="product">Product</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Relational ID (Foreign Key)</label>
                    <input type="number" id="relationalId" placeholder="ID of related record">
                </div>

                <div class="form-group">
                    <label>Collation - Repeatable Fields</label>
                    <div id="collationFields" class="repeatable-fields">
                        <div id="collationList"></div>
                        <button type="button" class="btn btn-add" onclick="addCollationItem()">+ Add Collation Item</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Meta Data - Repeatable Key/Value Pairs</label>
                    <div id="metaFields" class="repeatable-fields">
                        <div id="metaList"></div>
                        <button type="button" class="btn btn-add" onclick="addMetaItem()">+ Add Meta Item</button>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const GITHUB_CLIENT_ID = 'YOUR_GITHUB_CLIENT_ID'; // Replace with your GitHub OAuth App Client ID
        const REPO_OWNER = 'YOUR_GITHUB_USERNAME'; // Replace with your GitHub username
        const REPO_NAME = 'YOUR_REPO_NAME'; // Replace with your repository name
        const DATA_FILE_PATH = 'database.json';
        
        // Global state
        let database = [];
        let currentPage = 1;
        let rowsPerPage = 15;
        let currentFilters = {
            collection: '',
            metaKey: '',
            metaValue: '',
            relationalId: ''
        };
        let sortColumn = 'id';
        let sortDirection = 'asc';
        let githubToken = null;
        let githubUser = null;
        let syncInterval = null;
        let isSyncing = false;
        let lastSyncHash = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkGitHubAuth();
        });

        // GitHub OAuth Login
        function loginWithGitHub() {
            const redirectUri = `${window.location.origin}${window.location.pathname}`;
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${redirectUri}&scope=repo`;
            window.location.href = authUrl;
        }

        // Check GitHub authentication
        async function checkGitHubAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                await exchangeCodeForToken(code);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                const token = localStorage.getItem('github_token');
                const user = localStorage.getItem('github_user');
                if (token && user) {
                    githubToken = token;
                    githubUser = JSON.parse(user);
                    await initializeApp();
                } else {
                    showLoginScreen();
                }
            }
        }

        // Exchange code for token (you need a backend for this - using proxy)
        async function exchangeCodeForToken(code) {
            // Note: For production, you need a backend endpoint or use a proxy like:
            // https://cors-anywhere.herokuapp.com/https://github.com/login/oauth/access_token
            // Or use a serverless function
            
            // For demo, we'll use a simulated token
            // In production, implement proper OAuth flow with a backend
            showStatus('GitHub OAuth requires a backend proxy. Using demo mode.', 'info');
            simulateLogin();
        }

        // Simulate login for demo (replace with real OAuth)
        function simulateLogin() {
            githubUser = {
                login: 'demo_user',
                avatar_url: 'https://github.com/github.png',
                name: 'Demo User'
            };
            githubToken = 'demo_token';
            localStorage.setItem('github_token', githubToken);
            localStorage.setItem('github_user', JSON.stringify(githubUser));
            initializeApp();
        }

        // Initialize app after authentication
        async function initializeApp() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            // Display user info
            document.getElementById('userInfo').innerHTML = `
                <img src="${githubUser.avatar_url}" class="user-avatar" alt="${githubUser.login}">
                <span>${githubUser.name || githubUser.login}</span>
            `;
            
            await loadFromGitHub();
            startRealTimeSync();
            renderTable();
        }

        // Load data from GitHub
        async function loadFromGitHub() {
            showLoading(true);
            try {
                // Simulate GitHub API call
                // In production: const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE_PATH}`);
                await simulateGitHubFetch();
                
                updateSyncStatus(true, 'Loaded from GitHub');
                showStatus('Data synced with GitHub successfully', 'success');
            } catch (error) {
                console.error('Error loading from GitHub:', error);
                // Fallback to localStorage
                loadFromLocalStorage();
                showStatus('Using local cache - GitHub sync failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Simulate GitHub fetch (replace with actual API call)
        async function simulateGitHubFetch() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const saved = localStorage.getItem('github_database');
                    if (saved) {
                        database = JSON.parse(saved);
                    } else {
                        initSampleData();
                    }
                    resolve();
                }, 500);
            });
        }

        // Save to GitHub
        async function saveToGitHub() {
            if (!githubToken) return false;
            
            updateSyncStatus(true, 'Saving to GitHub...');
            try {
                // Simulate GitHub API save
                // In production: PUT to GitHub API
                await simulateGitHubSave();
                
                localStorage.setItem('github_database', JSON.stringify(database));
                updateSyncStatus(true, 'Saved to GitHub');
                showStatus('Changes saved to GitHub', 'success');
                return true;
            } catch (error) {
                console.error('Error saving to GitHub:', error);
                updateSyncStatus(false, 'Save failed');
                showStatus('Failed to save to GitHub', 'error');
                return false;
            }
        }

        // Simulate GitHub save
        async function simulateGitHubSave() {
            return new Promise((resolve) => {
                setTimeout(resolve, 500);
            });
        }

        // Load from localStorage fallback
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('github_database');
            if (saved) {
                database = JSON.parse(saved);
            } else {
                initSampleData();
            }
        }

        // Initialize sample data
        function initSampleData() {
            database = [
                {
                    id: 1,
                    relational_id: null,
                    collection: 'user',
                    collation: [{ type: 'primary', value: 'admin' }],
                    metakey: [{ key: 'name', value: 'John Doe' }, { key: 'email', value: 'john@example.com' }],
                    createddate: new Date('2024-01-01').toISOString(),
                    updatedate: new Date('2024-01-01').toISOString(),
                    createdBy: 'system'
                },
                {
                    id: 2,
                    relational_id: 1,
                    collection: 'post',
                    collation: [{ type: 'slug', value: 'first-post' }],
                    metakey: [{ key: 'title', value: 'First Post' }, { key: 'content', value: 'This is my first post' }],
                    createddate: new Date('2024-01-02').toISOString(),
                    updatedate: new Date('2024-01-02').toISOString(),
                    createdBy: 'system'
                },
                {
                    id: 3,
                    relational_id: 1,
                    collection: 'post',
                    collation: [{ type: 'slug', value: 'second-post' }],
                    metakey: [{ key: 'title', value: 'Second Post' }, { key: 'content', value: 'Another great post' }],
                    createddate: new Date('2024-01-03').toISOString(),
                    updatedate: new Date('2024-01-03').toISOString(),
                    createdBy: 'system'
                }
            ];
            saveDatabase();
        }

        // Real-time sync with polling
        function startRealTimeSync() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                if (!isSyncing) {
                    await checkForUpdates();
                }
            }, 30000); // Check every 30 seconds
        }

        // Check for updates from GitHub
        async function checkForUpdates() {
            const currentHash = getDatabaseHash();
            if (currentHash !== lastSyncHash) {
                await loadFromGitHub();
                renderTable();
                updateRelationalFilter();
                showStatus('Real-time update: New data detected', 'info');
            }
        }

        // Get database hash for change detection
        function getDatabaseHash() {
            return btoa(JSON.stringify(database));
        }

        // Force manual sync
        async function forceSync() {
            await loadFromGitHub();
            renderTable();
            updateRelationalFilter();
            showStatus('Manual sync completed', 'success');
        }

        // Update sync status UI
        function updateSyncStatus(success, message) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (success) {
                dot.className = 'sync-dot';
                text.textContent = message || 'Connected';
            } else {
                dot.className = 'sync-dot syncing';
                text.textContent = message || 'Syncing...';
            }
        }

        // Save database
        function saveDatabase() {
            database.sort((a, b) => a.id - b.id);
            localStorage.setItem('github_database', JSON.stringify(database));
            saveToGitHub();
            updateRelationalFilter();
            lastSyncHash = getDatabaseHash();
        }

        // Update relational filter dropdown
        function updateRelationalFilter() {
            const relations = new Set();
            database.forEach(record => {
                if (record.relational_id) relations.add(record.relational_id);
            });
            
            const filter = document.getElementById('relationalFilter');
            filter.innerHTML = '<option value="">All Relations</option>';
            Array.from(relations).sort((a,b) => a-b).forEach(rel => {
                filter.innerHTML += `<option value="${rel}">Relation ID: ${rel}</option>`;
            });
        }

        // Apply filters
        function applyFilters() {
            currentFilters.collection = document.getElementById('filterCollection').value.toLowerCase();
            currentFilters.metaKey = document.getElementById('filterMetaKey').value.toLowerCase();
            currentFilters.metaValue = document.getElementById('filterMetaValue').value.toLowerCase();
            currentFilters.relationalId = document.getElementById('relationalFilter').value;
            currentPage = 1;
            renderTable();
        }

        // Clear filters
        function clearFilters() {
            document.getElementById('filterCollection').value = '';
            document.getElementById('filterMetaKey').value = '';
            document.getElementById('filterMetaValue').value = '';
            document.getElementById('relationalFilter').value = '';
            currentFilters = { collection: '', metaKey: '', metaValue: '', relationalId: '' };
            currentPage = 1;
            renderTable();
        }

        // Get filtered data
        function getFilteredData() {
            return database.filter(record => {
                if (currentFilters.collection && !record.collection.toLowerCase().includes(currentFilters.collection)) return false;
                if (currentFilters.relationalId && record.relational_id != currentFilters.relationalId) return false;
                
                if (currentFilters.metaKey) {
                    const hasKey = record.metakey.some(m => m.key.toLowerCase().includes(currentFilters.metaKey));
                    if (!hasKey) return false;
                }
                
                if (currentFilters.metaValue) {
                    const hasValue = record.metakey.some(m => m.value.toLowerCase().includes(currentFilters.metaValue));
                    if (!hasValue) return false;
                }
                
                return true;
            });
        }

        // Sort data
        function sortData(data) {
            return [...data].sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                
                if (sortColumn === 'createddate' || sortColumn === 'updatedate') {
                    aVal = new Date(aVal).getTime();
                    bVal = new Date(bVal).getTime();
                }
                
                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // Render table with pagination
        function renderTable() {
            let filtered = getFilteredData();
            filtered = sortData(filtered);
            
            const total = filtered.length;
            const totalPages = Math.ceil(total / rowsPerPage);
            
            // Ensure current page is valid
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            
            const start = (currentPage - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, total);
            const pageData = filtered.slice(start, end);
            
            // Update pagination info
            document.getElementById('startRange').textContent = total === 0 ? 0 : start + 1;
            document.getElementById('endRange').textContent = end;
            document.getElementById('totalRecords').textContent = total;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
            
            // Update button states
            document.getElementById('firstBtn').disabled = currentPage === 1;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;
            document.getElementById('lastBtn').disabled = currentPage === totalPages || totalPages === 0;
            
            // Render table header
            const headers = ['ID', 'Collection', 'Relational ID', 'Collation', 'Meta Data', 'Created Date', 'Updated Date', 'Created By', 'Actions'];
            document.getElementById('tableHeader').innerHTML = `<tr>${
                headers.map(h => `<th onclick="sortByColumn('${h.toLowerCase().replace(/ /g, '')}')">${h} ${sortColumn === h.toLowerCase().replace(/ /g, '') ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</th>`).join('')
            }</tr>`;
            
            // Render table body
            document.getElementById('tableBody').innerHTML = pageData.map(record => `
                <tr>
                    <td><strong>${record.id}</strong></td>
                    <td><span class="badge" style="background: #667eea; color: white;">${record.collection}</span></td>
                    <td>${record.relational_id ? `<span class="badge" style="background: #ffc107; color: #333;">${record.relational_id}</span>` : '-'}</td>
                    <td><small>${record.collation.map(c => `${c.type}:${c.value}`).join(', ')}</small></td>
                    <td><small>${record.metakey.map(m => `${m.key}=${m.value}`).join(', ')}</small></td>
                    <td><small>${new Date(record.createddate).toLocaleString()}</small></td>
                    <td><small>${new Date(record.updatedate).toLocaleString()}</small></td>
                    <td><small>${record.createdBy || 'system'}</small></td>
                    <td>
                        <button class="btn" style="background: #28a745; color: white; padding: 4px 8px; margin-right: 5px; font-size: 12px;" onclick="editRecord(${record.id})">✏️ Edit</button>
                        <button class="btn" style="background: #dc3545; color: white; padding: 4px 8px; font-size: 12px;" onclick="deleteRecord(${record.id})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Sort by column
        function sortByColumn(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        // Pagination functions
        function firstPage() {
            currentPage = 1;
            renderTable();
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const total = getFilteredData().length;
            const totalPages = Math.ceil(total / rowsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function lastPage() {
            const total = getFilteredData().length;
            currentPage = Math.ceil(total / rowsPerPage);
            if (currentPage === 0) currentPage = 1;
            renderTable();
        }

        function changePageSize() {
            rowsPerPage = parseInt(document.getElementById('pageSizeSelect').value);
            currentPage = 1;
            renderTable();
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create New Record';
            document.getElementById('recordForm').reset();
            document.getElementById('recordId').value = '';
            
            document.getElementById('collationList').innerHTML = '';
            document.getElementById('metaList').innerHTML = '';
            
            document.getElementById('editModal').style.display = 'block';
        }

        // Edit record
        function editRecord(id) {
            const record = database.find(r => r.id === id);
            if (!record) return;
            
            document.getElementById('modalTitle').textContent = `Edit Record #${id}`;
            document.getElementById('recordId').value = record.id;
            document.getElementById('collection').value = record.collection;
            document.getElementById('relationalId').value = record.relational_id || '';
            
            document.getElementById('collationList').innerHTML = '';
            record.collation.forEach((item) => {
                addCollationItem(item.type, item.value);
            });
            
            document.getElementById('metaList').innerHTML = '';
            record.metakey.forEach((item) => {
                addMetaItem(item.key, item.value);
            });
            
            document.getElementById('editModal').style.display = 'block';
        }

        // Delete record
        async function deleteRecord(id) {
            if (confirm('Are you sure you want to delete this record? This action will sync to GitHub.')) {
                database = database.filter(r => r.id !== id);
                saveDatabase();
                renderTable();
                showStatus('Record deleted and synced to GitHub!', 'success');
            }
        }

        // Add collation item
        function addCollationItem(type = '', value = '') {
            const container = document.getElementById('collationList');
            const div = document.createElement('div');
            div.className = 'repeatable-item';
            div.innerHTML = `
                <button type="button" class="remove-item" onclick="this.parentElement.remove()">×</button>
                <input type="text" placeholder="Type (e.g., primary, slug)" value="${type}" style="width: 45%; margin-right: 5%;">
                <input type="text" placeholder="Value" value="${value}" style="width: 50%;">
            `;
            container.appendChild(div);
        }

        // Add meta item
        function addMetaItem(key = '', value = '') {
            const container = document.getElementById('metaList');
            const div = document.createElement('div');
            div.className = 'repeatable-item';
            div.innerHTML = `
                <button type="button" class="remove-item" onclick="this.parentElement.remove()">×</button>
                <input type="text" placeholder="Key" value="${key}" style="width: 45%; margin-right: 5%;">
                <input type="text" placeholder="Value" value="${value}" style="width: 50%;">
            `;
            container.appendChild(div);
        }

        // Save record
        document.getElementById('recordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('recordId').value;
            const collection = document.getElementById('collection').value;
            const relationalId = document.getElementById('relationalId').value;
            
            const collation = [];
            document.querySelectorAll('#collationList .repeatable-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    collation.push({ type: inputs[0].value, value: inputs[1].value });
                }
            });
            
            const metakey = [];
            document.querySelectorAll('#metaList .repeatable-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    metakey.push({ key: inputs[0].value, value: inputs[1].value });
                }
            });
            
            const now = new Date().toISOString();
            
            if (id) {
                const index = database.findIndex(r => r.id == id);
                if (index !== -1) {
                    database[index] = {
                        ...database[index],
                        collection,
                        relational_id: relationalId || null,
                        collation,
                        metakey,
                        updatedate: now,
                        updatedBy: githubUser?.login || 'system'
                    };
                }
            } else {
                const newId = database.length > 0 ? Math.max(...database.map(r => r.id)) + 1 : 1;
                database.push({
                    id: newId,
                    relational_id: relationalId || null,
                    collection,
                    collation,
                    metakey,
                    createddate: now,
                    updatedate: now,
                    createdBy: githubUser?.login || 'system',
                    updatedBy: githubUser?.login || 'system'
                });
            }
            
            saveDatabase();
            renderTable();
            closeModal();
            showStatus('Record saved and synced to GitHub!', 'success');
        });

        // Export to JSON
        function exportToJSON() {
            const dataStr = JSON.stringify(database, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `database_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus('Database exported successfully!', 'success');
        }

        // Import from JSON
        function importFromJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            database = imported;
                            saveDatabase();
                            renderTable();
                            showStatus('Database imported and synced to GitHub!', 'success');
                        } else {
                            throw new Error('Invalid format');
                        }
                    } catch (error) {
                        showStatus('Error importing file: Invalid JSON format', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Close modal
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.opacity = '0';
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    statusDiv.style.opacity = '1';
                }, 300);
            }, 3000);
        }

        // Show loading overlay
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Show login screen
        function showLoginScreen() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('appContainer').style.display = 'none';
        }

        // Logout
        function logout() {
            localStorage.removeItem('github_token');
            localStorage.removeItem('github_user');
            if (syncInterval) clearInterval(syncInterval);
            showLoginScreen();
            showStatus('Logged out successfully', 'success');
        }

        // Close modal when clicking outside
        window.onclick = (event) => {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
