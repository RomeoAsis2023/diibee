<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime JSON Database Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 24px; }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        .sync-dot.syncing { background: #fbbf24; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .toolbar {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { font-weight: 600; color: #495057; cursor: pointer; user-select: none; }
        th:hover { background: #e9ecef; }
        tr:hover { background: #f8f9fa; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 12px;
            padding: 30px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .close { cursor: pointer; font-size: 28px; font-weight: bold; color: #aaa; }
        .close:hover { color: #000; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #495057; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .repeatable-fields {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
        }
        .repeatable-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            position: relative;
        }
        .repeatable-item .remove-item {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-add {
            margin-top: 10px;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }
        .status {
            padding: 10px 20px;
            margin: 10px 30px;
            border-radius: 6px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .pagination {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .loading-spinner { background: white; padding: 30px; border-radius: 12px; text-align: center; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><div class="spinner"></div><p>Syncing with GitHub...</p></div>
    </div>

    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Realtime JSON Database <small>Live sync with database.json</small></h1>
                <p style="font-size: 12px; margin-top: 5px;">Direct read/write to your GitHub Pages JSON file</p>
            </div>
            <div class="sync-status">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText">Connected</span>
            </div>
        </div>

        <div class="toolbar">
            <div class="filters">
                <input type="text" id="filterCollection" placeholder="Filter Collection..." style="width: 150px;">
                <input type="text" id="filterMetaKey" placeholder="Filter Meta Key..." style="width: 150px;">
                <input type="text" id="filterMetaValue" placeholder="Filter Meta Value..." style="width: 150px;">
                <button class="btn btn-primary" onclick="applyFilters()">🔍 Apply Filters</button>
                <button class="btn btn-warning" onclick="clearFilters()">🔄 Clear</button>
                <button class="btn btn-success" onclick="fetchFromGitHub()">🔄 Force Sync</button>
            </div>
            <div>
                <button class="btn btn-primary" onclick="openCreateModal()">➕ Create New Record</button>
                <button class="btn btn-success" onclick="exportToJSON()">📥 Export JSON</button>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" style="text-align: center; padding: 40px;">Loading data from database.json...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <div>Showing <span id="startRange">0</span> - <span id="endRange">0</span> of <span id="totalRecords">0</span></div>
            <div>
                <button class="btn" onclick="previousPage()" id="prevBtn">◀ Previous</button>
                <span id="pageInfo" style="margin: 0 10px;">Page 1</span>
                <button class="btn" onclick="nextPage()" id="nextBtn">Next ▶</button>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Record</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="recordForm">
                <input type="hidden" id="recordId">
                <div class="form-group">
                    <label>ID *</label>
                    <input type="number" id="recordIdField" required>
                </div>
                <div class="form-group">
                    <label>Collection Type *</label>
                    <select id="collection" required>
                        <option value="user">User</option>
                        <option value="post">Post</option>
                        <option value="page">Page</option>
                        <option value="category">Category</option>
                        <option value="product">Product</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Relational ID (Foreign Key)</label>
                    <input type="number" id="relationalId" placeholder="ID of related record">
                </div>
                <div class="form-group">
                    <label>Collation - Repeatable Fields</label>
                    <div id="collationFields" class="repeatable-fields">
                        <div id="collationList"></div>
                        <button type="button" class="btn btn-add" onclick="addCollationItem()">+ Add Collation Item</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Meta Data - Repeatable Key/Value Pairs</label>
                    <div id="metaFields" class="repeatable-fields">
                        <div id="metaList"></div>
                        <button type="button" class="btn btn-add" onclick="addMetaItem()">+ Add Meta Item</button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const JSON_URL = 'https://romeoasis2023.github.io/diibee/database.json';
        // For writing, we need the raw GitHub API URL
        const GITHUB_API_URL = 'https://api.github.com/repos/RomeoAsis2023/diibee/contents/database.json';
        // You'll need a Personal Access Token for writes
        // Get one from: GitHub Settings → Developer settings → Personal access tokens → Tokens (classic)
        // Select 'repo' scope
        const GITHUB_TOKEN = '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'; // PASTE YOUR TOKEN HERE for write access, or leave empty for read-only
        
        let database = [];
        let currentPage = 1;
        let rowsPerPage = 15;
        let currentFilters = { collection: '', metaKey: '', metaValue: '' };
        let sortColumn = 'id';
        let sortDirection = 'asc';
        let currentFileSha = null;
        let syncInterval = null;

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchFromGitHub();
            startRealtimeSync();
        });

        // Fetch data from the live JSON file
        async function fetchFromGitHub() {
            showLoading(true);
            updateSyncStatus(false, 'Fetching...');
            try {
                const response = await fetch(`${JSON_URL}?t=${new Date().getTime()}`); // Cache bust
                if (response.ok) {
                    database = await response.json();
                    localStorage.setItem('database_backup', JSON.stringify(database));
                    showStatus(`Loaded ${database.length} records from database.json!`, 'success');
                    updateSyncStatus(true, 'Live');
                    renderTable();
                    updateRelationalFilter();
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('Error loading:', error);
                const backup = localStorage.getItem('database_backup');
                if (backup) {
                    database = JSON.parse(backup);
                    showStatus('Using cached data - check your internet connection', 'info');
                    renderTable();
                } else {
                    showStatus('Failed to load data. Make sure database.json exists.', 'error');
                }
                updateSyncStatus(false, 'Error');
            } finally {
                showLoading(false);
            }
        }

        // Save to GitHub (requires token)
        async function saveToGitHub() {
            if (!GITHUB_TOKEN) {
                showStatus('Read-only mode. Add GITHUB_TOKEN for saving.', 'info');
                localStorage.setItem('database_backup', JSON.stringify(database));
                return false;
            }

            showLoading(true);
            updateSyncStatus(false, 'Saving...');
            try {
                // First get current file SHA if we don't have it
                if (!currentFileSha) {
                    const shaResponse = await fetch(GITHUB_API_URL, {
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                    });
                    if (shaResponse.ok) {
                        const data = await shaResponse.json();
                        currentFileSha = data.sha;
                    }
                }

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(database, null, 2))));
                const response = await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update database.json - ${new Date().toLocaleString()}`,
                        content: content,
                        sha: currentFileSha
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentFileSha = data.content.sha;
                    localStorage.setItem('database_backup', JSON.stringify(database));
                    showStatus('Successfully saved to GitHub!', 'success');
                    updateSyncStatus(true, 'Saved');
                    return true;
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                console.error('Save error:', error);
                showStatus('Failed to save to GitHub. Check your token.', 'error');
                localStorage.setItem('database_backup', JSON.stringify(database));
                updateSyncStatus(false, 'Save failed');
                return false;
            } finally {
                showLoading(false);
                setTimeout(() => updateSyncStatus(true, 'Live'), 2000);
            }
        }

        // Realtime sync every 10 seconds
        function startRealtimeSync() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                await fetchFromGitHub();
            }, 10000); // Check every 10 seconds
        }

        // Update relational filter dropdown
        function updateRelationalFilter() {
            const relations = new Set();
            database.forEach(record => {
                if (record.relational_id) relations.add(record.relational_id);
            });
            // No relational filter select in this version
        }

        function applyFilters() {
            currentFilters.collection = document.getElementById('filterCollection').value.toLowerCase();
            currentFilters.metaKey = document.getElementById('filterMetaKey').value.toLowerCase();
            currentFilters.metaValue = document.getElementById('filterMetaValue').value.toLowerCase();
            currentPage = 1;
            renderTable();
        }

        function clearFilters() {
            document.getElementById('filterCollection').value = '';
            document.getElementById('filterMetaKey').value = '';
            document.getElementById('filterMetaValue').value = '';
            currentFilters = { collection: '', metaKey: '', metaValue: '' };
            currentPage = 1;
            renderTable();
        }

        function getFilteredData() {
            return database.filter(record => {
                if (currentFilters.collection && !record.collection.toLowerCase().includes(currentFilters.collection)) return false;
                if (currentFilters.metaKey) {
                    const hasKey = record.metakey.some(m => m.key.toLowerCase().includes(currentFilters.metaKey));
                    if (!hasKey) return false;
                }
                if (currentFilters.metaValue) {
                    const hasValue = record.metakey.some(m => m.value.toLowerCase().includes(currentFilters.metaValue));
                    if (!hasValue) return false;
                }
                return true;
            });
        }

        function sortData(data) {
            return [...data].sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                if (sortColumn === 'createddate' || sortColumn === 'updatedate') {
                    aVal = new Date(aVal).getTime();
                    bVal = new Date(bVal).getTime();
                }
                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function renderTable() {
            let filtered = getFilteredData();
            filtered = sortData(filtered);
            
            const total = filtered.length;
            const start = (currentPage - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, total);
            const pageData = filtered.slice(start, end);
            
            document.getElementById('startRange').textContent = total === 0 ? 0 : start + 1;
            document.getElementById('endRange').textContent = end;
            document.getElementById('totalRecords').textContent = total;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.ceil(total / rowsPerPage) || 1}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= total;
            
            if (total === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">No records found</td></tr>';
                return;
            }
            
            const headers = ['ID', 'Collection', 'Relational ID', 'Collation', 'Meta Data', 'Created Date', 'Updated Date', 'Created By', 'Actions'];
            document.getElementById('tableHeader').innerHTML = `<tr>${
                headers.map(h => `<th onclick="sortByColumn('${h.toLowerCase().replace(/ /g, '')}')">${h} ${sortColumn === h.toLowerCase().replace(/ /g, '') ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</th>`).join('')
            }</tr>`;
            
            document.getElementById('tableBody').innerHTML = pageData.map(record => `
                <tr>
                    <td><strong>${record.id}</strong></td>
                    <td><span class="badge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px;">${record.collection}</span></td>
                    <td>${record.relational_id ? `<span class="badge" style="background: #ffc107; color: #333; padding: 4px 8px; border-radius: 4px;">${record.relational_id}</span>` : '-'}</td>
                    <td><small>${record.collation?.map(c => `${c.type}:${c.value}`).join(', ') || '-'}</small></td>
                    <td><small>${record.metakey?.map(m => `${m.key}=${m.value}`).join(', ') || '-'}</small></td>
                    <td><small>${new Date(record.createddate).toLocaleString()}</small></td>
                    <td><small>${new Date(record.updatedate).toLocaleString()}</small></td>
                    <td><small>${record.createdBy || 'system'}</small></td>
                    <td>
                        <button class="btn" style="background: #28a745; color: white; padding: 4px 8px; margin-right: 5px; font-size: 12px;" onclick="editRecord(${record.id})">✏️ Edit</button>
                        <button class="btn" style="background: #dc3545; color: white; padding: 4px 8px; font-size: 12px;" onclick="deleteRecord(${record.id})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function sortByColumn(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        function previousPage() { if (currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() {
            const total = getFilteredData().length;
            const totalPages = Math.ceil(total / rowsPerPage);
            if (currentPage < totalPages) { currentPage++; renderTable(); }
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create New Record';
            document.getElementById('recordForm').reset();
            document.getElementById('recordId').value = '';
            document.getElementById('recordIdField').value = database.length > 0 ? Math.max(...database.map(r => r.id)) + 1 : 1;
            document.getElementById('collationList').innerHTML = '';
            document.getElementById('metaList').innerHTML = '';
            document.getElementById('editModal').style.display = 'block';
        }

        function editRecord(id) {
            const record = database.find(r => r.id === id);
            if (!record) return;
            document.getElementById('modalTitle').textContent = `Edit Record #${id}`;
            document.getElementById('recordId').value = record.id;
            document.getElementById('recordIdField').value = record.id;
            document.getElementById('collection').value = record.collection;
            document.getElementById('relationalId').value = record.relational_id || '';
            document.getElementById('collationList').innerHTML = '';
            record.collation?.forEach(item => addCollationItem(item.type, item.value));
            document.getElementById('metaList').innerHTML = '';
            record.metakey?.forEach(item => addMetaItem(item.key, item.value));
            document.getElementById('editModal').style.display = 'block';
        }

        async function deleteRecord(id) {
            if (confirm('Are you sure you want to delete this record?')) {
                database = database.filter(r => r.id !== id);
                await saveToGitHub();
                fetchFromGitHub(); // Refresh after save
                showStatus('Record deleted!', 'success');
            }
        }

        function addCollationItem(type = '', value = '') {
            const container = document.getElementById('collationList');
            const div = document.createElement('div');
            div.className = 'repeatable-item';
            div.innerHTML = `
                <button type="button" class="remove-item" onclick="this.parentElement.remove()">×</button>
                <input type="text" placeholder="Type" value="${type.replace(/"/g, '&quot;')}" style="width: 45%; margin-right: 5%;">
                <input type="text" placeholder="Value" value="${value.replace(/"/g, '&quot;')}" style="width: 50%;">
            `;
            container.appendChild(div);
        }

        function addMetaItem(key = '', value = '') {
            const container = document.getElementById('metaList');
            const div = document.createElement('div');
            div.className = 'repeatable-item';
            div.innerHTML = `
                <button type="button" class="remove-item" onclick="this.parentElement.remove()">×</button>
                <input type="text" placeholder="Key" value="${key.replace(/"/g, '&quot;')}" style="width: 45%; margin-right: 5%;">
                <input type="text" placeholder="Value" value="${value.replace(/"/g, '&quot;')}" style="width: 50%;">
            `;
            container.appendChild(div);
        }

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('recordIdField').value);
            const existingId = document.getElementById('recordId').value;
            const collection = document.getElementById('collection').value;
            const relationalId = document.getElementById('relationalId').value;
            
            const collation = [];
            document.querySelectorAll('#collationList .repeatable-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0]?.value && inputs[1]?.value) {
                    collation.push({ type: inputs[0].value, value: inputs[1].value });
                }
            });
            
            const metakey = [];
            document.querySelectorAll('#metaList .repeatable-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0]?.value && inputs[1]?.value) {
                    metakey.push({ key: inputs[0].value, value: inputs[1].value });
                }
            });
            
            const now = new Date().toISOString();
            
            if (existingId) {
                const index = database.findIndex(r => r.id == existingId);
                if (index !== -1) {
                    database[index] = { ...database[index], collection, relational_id: relationalId || null, collation, metakey, updatedate: now };
                }
            } else {
                if (database.some(r => r.id === id)) {
                    showStatus(`Record with ID ${id} already exists!`, 'error');
                    return;
                }
                database.push({ id, relational_id: relationalId || null, collection, collation, metakey, createddate: now, updatedate: now, createdBy: "user", updatedBy: "user" });
            }
            
            await saveToGitHub();
            fetchFromGitHub(); // Refresh after save
            closeModal();
            showStatus('Record saved!', 'success');
        });

        function exportToJSON() {
            const dataStr = JSON.stringify(database, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `database_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        }
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function updateSyncStatus(connected, message) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (connected) {
                dot.className = 'sync-dot';
                text.textContent = message || 'Connected';
            } else {
                dot.className = 'sync-dot syncing';
                text.textContent = message || 'Syncing...';
            }
        }
        window.onclick = (event) => { if (event.target === document.getElementById('editModal')) closeModal(); };
    </script>
</body>
</html>
