<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic JSON Database - Sveltia CMS Compatible</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 24px; }
        .header h1 small { font-size: 12px; opacity: 0.9; }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        .sync-dot.syncing { background: #fbbf24; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .toolbar {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { font-weight: 600; color: #495057; cursor: pointer; user-select: none; }
        th:hover { background: #e9ecef; }
        tr:hover { background: #f8f9fa; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 12px;
            padding: 30px;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .close { cursor: pointer; font-size: 28px; font-weight: bold; color: #aaa; }
        .close:hover { color: #000; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #495057; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .repeatable-fields {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
        }
        .repeatable-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            position: relative;
        }
        .repeatable-item .remove-item {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-add {
            margin-top: 10px;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }
        .status {
            padding: 10px 20px;
            margin: 10px 30px;
            border-radius: 6px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .pagination {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .loading-spinner { background: white; padding: 30px; border-radius: 12px; text-align: center; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .record-count {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><div class="spinner"></div><p>Loading records from GitHub...</p></div>
    </div>

    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Dynamic JSON Database <small>Sveltia CMS Compatible</small></h1>
                <p style="font-size: 12px; margin-top: 5px;">Reading individual JSON files: <span id="fileCount">0</span> records found</p>
            </div>
            <div class="sync-status">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText">Connected</span>
            </div>
        </div>

        <div class="toolbar">
            <div class="filters">
                <input type="text" id="filterCollection" placeholder="Filter Collection..." style="width: 150px;">
                <input type="text" id="filterMetaKey" placeholder="Filter Meta Key..." style="width: 150px;">
                <input type="text" id="filterMetaValue" placeholder="Filter Meta Value..." style="width: 150px;">
                <button class="btn btn-primary" onclick="applyFilters()">🔍 Apply Filters</button>
                <button class="btn btn-warning" onclick="clearFilters()">🔄 Clear</button>
                <button class="btn btn-success" onclick="loadAllRecords()">🔄 Force Sync</button>
            </div>
            <div>
                <a href="/admin/" class="btn btn-primary" style="text-decoration: none;">🚀 Open Sveltia CMS</a>
                <button class="btn btn-success" onclick="exportToJSON()">📥 Export All JSON</button>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" style="text-align: center; padding: 40px;">Loading records from individual JSON files...<br><small>Looking for files like 1.json, 2.json, etc.</small></td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <div>Showing <span id="startRange">0</span> - <span id="endRange">0</span> of <span id="totalRecords">0</span></div>
            <div>
                <button class="btn" onclick="previousPage()" id="prevBtn">◀ Previous</button>
                <span id="pageInfo" style="margin: 0 10px;">Page 1</span>
                <button class="btn" onclick="nextPage()" id="nextBtn">Next ▶</button>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const REPO_OWNER = 'RomeoAsis2023';
        const REPO_NAME = 'diibee';
        const BRANCH = 'main';
        const GITHUB_API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
        
        // Read-only mode (safe for public)
        const GITHUB_TOKEN = ''; // Leave empty for read-only
        
        let database = [];
        let currentPage = 1;
        let rowsPerPage = 15;
        let currentFilters = { collection: '', metaKey: '', metaValue: '' };
        let sortColumn = 'id';
        let sortDirection = 'asc';
        let syncInterval = null;

        // Load all JSON files on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadAllRecords();
            startRealtimeSync();
        });

        // Discover and load all JSON files from repository root
        async function loadAllRecords() {
            showLoading(true);
            updateSyncStatus(false, 'Scanning files...');
            
            try {
                // Get list of all files in repository root
                const response = await fetch(`${GITHUB_API_URL}?ref=${BRANCH}`, {
                    headers: GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {}
                });
                
                if (response.ok) {
                    const files = await response.json();
                    // Filter for JSON files that match number pattern (1.json, 2.json, etc.)
                    const jsonFiles = files.filter(file => 
                        file.name.match(/^\d+\.json$/) && file.type === 'file'
                    );
                    
                    document.getElementById('fileCount').textContent = jsonFiles.length;
                    showStatus(`Found ${jsonFiles.length} record files`, 'info');
                    
                    // Load each JSON file
                    const records = [];
                    for (const file of jsonFiles) {
                        try {
                            const fileResponse = await fetch(file.download_url);
                            if (fileResponse.ok) {
                                const record = await fileResponse.json();
                                records.push(record);
                            }
                        } catch (err) {
                            console.error(`Failed to load ${file.name}:`, err);
                        }
                    }
                    
                    // Sort by ID
                    records.sort((a, b) => a.id - b.id);
                    database = records;
                    localStorage.setItem('database_backup', JSON.stringify(database));
                    
                    showStatus(`Loaded ${database.length} records successfully!`, 'success');
                    updateSyncStatus(true, `Live (${database.length} records)`);
                    renderTable();
                    updateRelationalFilter();
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('Error loading files:', error);
                // Fallback to backup
                const backup = localStorage.getItem('database_backup');
                if (backup) {
                    database = JSON.parse(backup);
                    showStatus('Using cached data - GitHub API may be rate limited', 'info');
                    renderTable();
                } else {
                    showStatus('No records found. Create records using Sveltia CMS at /admin/', 'error');
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">No records found. <a href="/admin/">Create your first record in Sveltia CMS →</a></td></tr>';
                }
                updateSyncStatus(false, 'Error');
            } finally {
                showLoading(false);
            }
        }

        // Realtime sync every 15 seconds
        function startRealtimeSync() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                await loadAllRecords();
            }, 15000);
        }

        function updateRelationalFilter() {
            const relations = new Set();
            database.forEach(record => {
                if (record.relational_id) relations.add(record.relational_id);
            });
        }

        function applyFilters() {
            currentFilters.collection = document.getElementById('filterCollection').value.toLowerCase();
            currentFilters.metaKey = document.getElementById('filterMetaKey').value.toLowerCase();
            currentFilters.metaValue = document.getElementById('filterMetaValue').value.toLowerCase();
            currentPage = 1;
            renderTable();
        }

        function clearFilters() {
            document.getElementById('filterCollection').value = '';
            document.getElementById('filterMetaKey').value = '';
            document.getElementById('filterMetaValue').value = '';
            currentFilters = { collection: '', metaKey: '', metaValue: '' };
            currentPage = 1;
            renderTable();
        }

        function getFilteredData() {
            return database.filter(record => {
                if (currentFilters.collection && !record.collection.toLowerCase().includes(currentFilters.collection)) return false;
                if (currentFilters.metaKey) {
                    const hasKey = record.metakey?.some(m => m.key.toLowerCase().includes(currentFilters.metaKey));
                    if (!hasKey) return false;
                }
                if (currentFilters.metaValue) {
                    const hasValue = record.metakey?.some(m => m.value.toLowerCase().includes(currentFilters.metaValue));
                    if (!hasValue) return false;
                }
                return true;
            });
        }

        function sortData(data) {
            return [...data].sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                if (sortColumn === 'createddate' || sortColumn === 'updatedate') {
                    aVal = new Date(aVal).getTime();
                    bVal = new Date(bVal).getTime();
                }
                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function renderTable() {
            let filtered = getFilteredData();
            filtered = sortData(filtered);
            
            const total = filtered.length;
            const start = (currentPage - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, total);
            const pageData = filtered.slice(start, end);
            
            document.getElementById('startRange').textContent = total === 0 ? 0 : start + 1;
            document.getElementById('endRange').textContent = end;
            document.getElementById('totalRecords').textContent = total;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.ceil(total / rowsPerPage) || 1}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= total;
            
            if (total === 0) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 40px;">
                    No records found. <a href="/admin/" style="color: #667eea;">Create records using Sveltia CMS →</a>
                </td></tr>`;
                document.getElementById('tableHeader').innerHTML = '';
                return;
            }
            
            const headers = ['ID', 'Collection', 'Relational ID', 'Collation', 'Meta Data', 'Created Date', 'Updated Date', 'Created By', 'Actions'];
            document.getElementById('tableHeader').innerHTML = `<tr>${
                headers.map(h => `<th onclick="sortByColumn('${h.toLowerCase().replace(/ /g, '')}')">${h} ${sortColumn === h.toLowerCase().replace(/ /g, '') ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</th>`).join('')
            }</tr>`;
            
            document.getElementById('tableBody').innerHTML = pageData.map(record => `
                <tr>
                    <td><strong>${record.id}</strong></td>
                    <td><span class="badge" style="background: #667eea; color: white; padding: 4px 8px; border-radius: 4px;">${record.collection}</span></td>
                    <td>${record.relational_id ? `<span class="badge" style="background: #ffc107; color: #333; padding: 4px 8px; border-radius: 4px;">${record.relational_id}</span>` : '-'}</td>
                    <td><small>${record.collation?.map(c => `${c.type}:${c.value}`).join(', ') || '-'}</small></td>
                    <td><small>${record.metakey?.map(m => `${m.key}=${m.value}`).join(', ') || '-'}</small></td>
                    <td><small>${new Date(record.createddate).toLocaleString()}</small></td>
                    <td><small>${new Date(record.updatedate).toLocaleString()}</small></td>
                    <td><small>${record.createdBy || 'system'}</small></td>
                    <td>
                        <button class="btn" style="background: #28a745; color: white; padding: 4px 8px; margin-right: 5px; font-size: 12px;" onclick="viewRecord(${record.id})">👁️ View</button>
                    </td>
                </tr>
            `).join('');
        }

        function viewRecord(id) {
            const record = database.find(r => r.id === id);
            if (record) {
                alert(JSON.stringify(record, null, 2));
            }
        }

        function sortByColumn(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        function previousPage() { if (currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() {
            const total = getFilteredData().length;
            const totalPages = Math.ceil(total / rowsPerPage);
            if (currentPage < totalPages) { currentPage++; renderTable(); }
        }

        function exportToJSON() {
            const dataStr = JSON.stringify(database, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `all_records_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus(`Exported ${database.length} records!`, 'success');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        }
        
        function showLoading(show) { 
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; 
        }
        
        function updateSyncStatus(connected, message) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (connected) {
                dot.className = 'sync-dot';
                text.textContent = message || 'Connected';
            } else {
                dot.className = 'sync-dot syncing';
                text.textContent = message || 'Syncing...';
            }
        }
    </script>
</body>
</html>
